<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h3>HOME</h3>
        <h2 id="score1">0</h2>
        <div class="btn-group">
          <button id="home-btn1" class="btn" onclick="plusOne('home')">+1</button>
          <button id="home-btn2" class="btn" onclick="plusTwo('home')">+2</button>
          <button id="home-btn" class="btn" onclick="plusThree('home')">+3</button>
        </div>
      </div>
      <div>
        <h3>GUEST</h3>
        <h2 id="score2">0</h2>
        <div class="btn-group">
          <button id="guest-btn1" class="btn" onclick="plusOne('guest')">+1</button>
          <button id="guest-btn2" class="btn" onclick="plusTwo('guest')">+2</button>
          <button id="guest-btn3" class="btn" onclick="plusThree('guest')">+3</button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
